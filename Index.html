<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            font-size: 1.4rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #666;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0071e3;
        }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #f0f7ff;
            border-left: 4px solid #0071e3;
            border-radius: 4px;
        }
        .result-title {
            font-size: 0.85rem;
            color: #0071e3;
            font-weight: bold;
            text-transform: uppercase;
        }
        .result-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #1d1d1f;
            margin-top: 5px;
        }
        .error {
            color: #df1c1c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
        .graph-container {
            position: relative;
            min-height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Integration Calculator</h2>
        
        <div class="input-group">
            <label for="functionInput">Function f(x)</label>
            <input type="text" id="functionInput" value="x^2 - 2x + 1" placeholder="e.g., sin(x), x^2, 2x">
            <div id="errorMsg" class="error">Invalid math expression</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label for="lowerBound">Lower Bound (a)</label>
                <input type="number" id="lowerBound" value="0" step="any">
            </div>
            <div class="input-group">
                <label for="upperBound">Upper Bound (b)</label>
                <input type="number" id="upperBound" value="3" step="any">
            </div>
        </div>

        <div class="result-box">
            <div class="result-title">Definite Integral Value</div>
            <div class="result-value" id="resultDisplay">0.00</div>
        </div>
    </div>

    <div class="graph-container">
        <canvas id="mathChart"></canvas>
    </div>
</div>
